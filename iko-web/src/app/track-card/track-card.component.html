<div
  class="flex items-center gap-3 rounded-lg border bg-card p-2.5 shadow-sm transition-shadow hover:shadow-md sm:p-3"
>
  <img
    [src]="imageUrl || 'https://via.placeholder.com/60x60?text=No+Art'"
    [alt]="name"
    class="size-12 shrink-0 rounded-md object-cover sm:size-[60px]"
  />
  <div class="flex min-w-0 flex-1 flex-col">
    <span class="truncate text-sm font-medium text-foreground">{{ name }}</span>
    <span class="truncate text-xs text-muted-foreground">{{ artist }}</span>
  </div>
  <span
    hlmBadge
    [variant]="matched ? 'default' : 'secondary'"
    class="shrink-0 uppercase tracking-wide"
  >
    {{ matched ? 'Matched' : 'Not Found' }}
  </span>
</div>
