@if (track) {
  <div
    class="fixed inset-x-0 bottom-0 z-50 flex h-16 items-center gap-2 border-t bg-background/95 px-2 backdrop-blur shadow-[0_-4px_16px_rgba(0,0,0,0.06)] sm:h-18 sm:gap-4 sm:px-4"
  >
    <!-- Track info -->
    <div class="flex min-w-0 max-w-[50%] items-center gap-3 sm:max-w-[30%]">
      <div class="relative size-10 shrink-0 sm:size-12">
        @if (track.imageUrl) {
          <img
            [src]="track.imageUrl"
            [alt]="track.name"
            class="size-full rounded-md object-cover shadow-sm"
          />
        } @else {
          <div class="flex size-full items-center justify-center rounded-md bg-muted text-muted-foreground">
            <ng-icon hlm name="lucideMusic" class="text-lg" />
          </div>
        }
        @if (s.isPlaying) {
          <!-- now-playing pulse + equalizer overlay -->
          <span class="pointer-events-none absolute inset-0 rounded-md animate-pulse-ring"></span>
          <span
            class="absolute bottom-0.5 left-0.5 flex h-3 items-end gap-[2px] rounded-sm bg-black/55 px-1 py-0.5 backdrop-blur-sm"
            aria-hidden="true"
          >
            <span class="eq-bar h-full"></span>
            <span class="eq-bar h-full"></span>
            <span class="eq-bar h-full"></span>
          </span>
        }
      </div>
      <div class="flex min-w-0 flex-col">
        <span class="truncate text-xs font-semibold sm:text-[0.8125rem]">{{ track.name }}</span>
        <span class="truncate text-[0.6875rem] text-muted-foreground">{{ track.artist }}</span>
      </div>
      <app-platform-badge [platform]="track.platform" size="sm" />
    </div>

    <!-- Controls + progress -->
    <div class="flex flex-1 flex-col items-center gap-0.5">
      <div class="flex items-center gap-1">
        <button
          hlmBtn variant="ghost" size="icon"
          class="hidden text-muted-foreground sm:inline-flex"
          [class.text-primary]="s.isShuffle"
          aria-label="Shuffle"
          (click)="player.toggleShuffle()"
        >
          <ng-icon hlm name="lucideShuffle" />
        </button>
        <button hlmBtn variant="ghost" size="icon" class="text-muted-foreground" aria-label="Previous" (click)="player.previous()">
          <ng-icon hlm name="lucideSkipBack" />
        </button>
        <button
          type="button"
          class="flex size-9 items-center justify-center rounded-full bg-play text-play-foreground shadow-md transition-transform hover:scale-105 active:scale-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-play focus-visible:ring-offset-2 focus-visible:ring-offset-background sm:size-10"
          [attr.aria-label]="s.isPlaying ? 'Pause' : 'Play'"
          (click)="togglePlay()"
        >
          <ng-icon hlm [name]="s.isPlaying ? 'lucidePause' : 'lucidePlay'" class="text-xl" />
        </button>
        <button hlmBtn variant="ghost" size="icon" class="text-muted-foreground" aria-label="Next" (click)="player.next()">
          <ng-icon hlm name="lucideSkipForward" />
        </button>
        <button
          hlmBtn variant="ghost" size="icon"
          class="hidden text-muted-foreground sm:inline-flex"
          [class.text-primary]="s.repeatMode !== 'none'"
          aria-label="Repeat"
          (click)="player.toggleRepeat()"
        >
          <ng-icon hlm [name]="s.repeatMode === 'one' ? 'lucideRepeat1' : 'lucideRepeat'" />
        </button>
      </div>

      <div class="hidden w-full max-w-[500px] items-center gap-2 sm:flex">
        <span class="min-w-8 text-center text-[0.6875rem] text-muted-foreground">{{ player.formatTime(s.positionMs) }}</span>
        <input
          type="range"
          class="iko-range h-3.5 flex-1"
          min="0"
          [max]="s.durationMs || 1"
          [value]="s.positionMs"
          (input)="onSeek($event)"
          aria-label="Seek"
        />
        <span class="min-w-8 text-center text-[0.6875rem] text-muted-foreground">{{ player.formatTime(s.durationMs) }}</span>
      </div>
    </div>

    <!-- Volume (desktop) -->
    <div class="hidden items-center gap-1.5 sm:flex">
      <button hlmBtn variant="ghost" size="icon" class="text-muted-foreground" [attr.aria-label]="s.isMuted ? 'Unmute' : 'Mute'" (click)="player.toggleMute()">
        <ng-icon hlm [name]="volumeIcon" />
      </button>
      <input
        type="range"
        class="iko-range iko-range--brand h-3.5 w-20"
        min="0"
        max="1"
        step="0.01"
        [value]="s.isMuted ? 0 : s.volume"
        (input)="onVolume($event)"
        aria-label="Volume"
      />
    </div>

    @if (s.isLoading) {
      <div class="absolute inset-0 flex items-center justify-center bg-background/90 text-sm text-muted-foreground">
        <span>{{ s.loadingMessage }}</span>
      </div>
    }
  </div>
}
