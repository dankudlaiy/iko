<header
  class="sticky top-0 z-40 border-b bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/60"
>
  <nav class="mx-auto flex h-16 max-w-7xl items-center gap-2 px-4 sm:px-6">
    <a routerLink="/" class="group flex items-center gap-2" aria-label="iko home">
      <span
        class="flex size-8 items-center justify-center gap-[3px] rounded-lg bg-gradient-to-br from-primary to-violet-500 shadow-sm transition-transform duration-200 group-hover:scale-105"
      >
        <span class="h-3 w-[3px] rounded-full bg-white/90"></span>
        <span class="h-4 w-[3px] rounded-full bg-white"></span>
        <span class="h-2.5 w-[3px] rounded-full bg-white/80"></span>
      </span>
      <span
        class="font-heading bg-gradient-to-r from-primary to-violet-400 bg-clip-text text-2xl font-extrabold tracking-tight text-transparent"
        >iko</span
      >
    </a>

    <span class="flex-1"></span>

    <!-- Desktop nav -->
    <div class="hidden items-center gap-1 md:flex">
      @if (isLoggedIn) {
        <a hlmBtn variant="ghost" size="sm" routerLink="/" routerLinkActive="bg-accent text-accent-foreground" [routerLinkActiveOptions]="{ exact: true }">Library</a>
        <a hlmBtn variant="ghost" size="sm" routerLink="/settings" routerLinkActive="bg-accent text-accent-foreground">Settings</a>
        <span class="mx-2 text-xs text-muted-foreground">{{ user?.email }}</span>
        <button hlmBtn variant="outline" size="sm" (click)="logout()">Logout</button>
      } @else {
        <a hlmBtn variant="ghost" size="sm" routerLink="/login" routerLinkActive="bg-accent text-accent-foreground">Login</a>
        <a hlmBtn size="sm" routerLink="/register">Sign Up</a>
      }

      <button hlmBtn variant="ghost" size="icon" (click)="theme.toggle()" aria-label="Toggle dark mode">
        <ng-icon hlm [name]="theme.isDark ? 'lucideSun' : 'lucideMoon'" />
      </button>
    </div>

    <!-- Mobile actions -->
    <div class="flex items-center gap-1 md:hidden">
      <button hlmBtn variant="ghost" size="icon" (click)="theme.toggle()" aria-label="Toggle dark mode">
        <ng-icon hlm [name]="theme.isDark ? 'lucideSun' : 'lucideMoon'" />
      </button>
      <button
        hlmBtn
        variant="ghost"
        size="icon"
        (click)="toggleMenu()"
        [attr.aria-expanded]="mobileMenuOpen"
        aria-label="Toggle navigation menu"
      >
        <ng-icon hlm [name]="mobileMenuOpen ? 'lucideX' : 'lucideMenu'" />
      </button>
    </div>
  </nav>
</header>

<!-- Mobile drawer -->
@if (mobileMenuOpen) {
  <div class="fixed inset-0 z-40 bg-black/40 md:hidden" (click)="closeMenu()"></div>
  <div
    class="fixed right-0 top-0 z-50 flex h-dvh w-72 flex-col gap-1 border-l bg-background p-6 shadow-xl md:hidden"
  >
    @if (isLoggedIn) {
      <a routerLink="/" (click)="closeMenu()" class="rounded-md px-3 py-2 text-base font-medium hover:bg-accent">Library</a>
      <a routerLink="/settings" (click)="closeMenu()" class="rounded-md px-3 py-2 text-base font-medium hover:bg-accent">Settings</a>
      <span class="px-3 py-2 text-sm text-muted-foreground">{{ user?.email }}</span>
      <button hlmBtn variant="outline" class="mt-auto" (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/login" (click)="closeMenu()" class="rounded-md px-3 py-2 text-base font-medium hover:bg-accent">Login</a>
      <a hlmBtn routerLink="/register" (click)="closeMenu()" class="mt-2">Sign Up</a>
    }
  </div>
}
